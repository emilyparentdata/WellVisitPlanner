<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Well Visit Prep — Powered by ParentData</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="src/style.css">
</head>
<body>
  <header class="app-header">
    <h1 class="app-title">Well Visit Prep</h1>
    <p class="app-subtitle">Powered by <a href="https://parentdata.org" target="_blank" rel="noopener noreferrer">ParentData</a></p>
  </header>

  <main id="app">
    <!-- Screen 1: Visit Picker -->
    <section id="screen-picker" class="screen active">
      <p class="picker-intro">Choose your child's upcoming well visit to get a personalized prep document.</p>
      <div id="visit-grid" class="visit-grid"></div>
    </section>

    <!-- Screen 2: Prep Document -->
    <section id="screen-prep" class="screen">
      <button id="btn-back" class="btn-back" aria-label="Back to visit picker">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M13 16l-6-6 6-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        All Visits
      </button>
      <div id="prep-content"></div>
    </section>
  </main>

  <!-- Sticky share bar -->
  <div id="share-bar" class="share-bar hidden">
    <button id="btn-share" class="share-btn share-btn--primary" title="Share">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M4 12v7a2 2 0 002 2h12a2 2 0 002-2v-7M16 6l-4-4-4 4M12 2v13" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Share
    </button>
    <button id="btn-copy" class="share-btn" title="Copy to clipboard">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="9" y="9" width="13" height="13" rx="2" stroke="currentColor" stroke-width="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1" stroke="currentColor" stroke-width="2"/></svg>
      Copy
    </button>
    <button id="btn-email" class="share-btn" title="Open formatted preview">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="14 2 14 8 20 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Preview
    </button>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script type="module" src="src/main.js"></script>
</body>
</html>
